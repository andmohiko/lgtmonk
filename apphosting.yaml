# Firebase App Hosting configuration for TanStack Start
#
# For monorepo setup:
# - The build script in root package.json now uses pnpm filter instead of turbo
# - This allows building without turbo being installed in production

runConfig:
  # Node.js runtime version
  runtime: nodejs20

  # CPU and memory allocation
  cpu: 1
  memoryMiB: 512

  # Auto-scaling configuration
  minInstances: 0  # Allow cold starts to save costs
  maxInstances: 10
  concurrency: 80

  # Request timeout (in seconds)
  timeoutSeconds: 60

# Environment variables
env:
  # Build and runtime environment
  - variable: NODE_ENV
    value: production
    availability:
      - BUILD
      - RUNTIME

  # Firebase configuration (set these as secrets in Firebase Console)
  # These need to be available at BUILD time for Vite bundling
  - variable: VITE_FIREBASE_API_KEY
    secret: firebase-api-key
    availability:
      - BUILD
      - RUNTIME
  - variable: VITE_FIREBASE_AUTH_DOMAIN
    secret: firebase-auth-domain
    availability:
      - BUILD
      - RUNTIME
  - variable: VITE_FIREBASE_PROJECT_ID
    secret: firebase-project-id
    availability:
      - BUILD
      - RUNTIME
  - variable: VITE_FIREBASE_STORAGE_BUCKET
    secret: firebase-storage-bucket
    availability:
      - BUILD
      - RUNTIME
  - variable: VITE_FIREBASE_MESSAGING_SENDER_ID
    secret: firebase-messaging-sender-id
    availability:
      - BUILD
      - RUNTIME
  - variable: VITE_FIREBASE_APP_ID
    secret: firebase-app-id
    availability:
      - BUILD
      - RUNTIME

  # Cloud Functions URL
  - variable: VITE_FIREBASE_FUNCTIONS_URL
    secret: firebase-functions-url
    availability:
      - BUILD
      - RUNTIME
